name: SecretScout — Secret Detection

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for history scan mode

      - name: SecretScout Scan
        uses: ./.github/actions/secretscout-scan
        with:
          secretscout-url: ${{ secrets.SECRETSCOUT_URL }}
          api-key: ${{ secrets.SECRETSCOUT_API_KEY }}
          scan-mode: current
          fail-on-finding: 'true'
          severity-threshold: high
